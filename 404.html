<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | ImageShrink</title>
<meta name="robots" content="noindex">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#12181f;color:#e8ecef;font-family:ui-sans-serif,-apple-system,'Segoe UI',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;
  }
  .code{font-family:ui-monospace,monospace;font-size:64px;font-weight:600;color:#e8a33d;line-height:1;}
  h1{font-size:20px;margin:14px 0 8px;}
  p{color:#8b96a3;font-size:14px;margin-bottom:22px;}
  a{
    display:inline-block;background:#e8a33d;color:#1a1200;text-decoration:none;
    padding:12px 22px;border-radius:12px;font-weight:600;font-size:14px;
  }
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>This page doesn't exist</h1>
    <p>The link might be broken, or the page may have moved.</p>
    <a href="index.html">Back to the compressor</a>
  </div>
</body>
</html>
